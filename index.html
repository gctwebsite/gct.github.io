<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime İzleme Platformu</title>
    <style>
        /* Genel Sayfa Tasarımı */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #c5c6c7;
            margin: 0;
            padding: 0;
        }

        /* Header / Üst Menü */
        header {
            background-color: #1f2833;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #66fcf1;
        }

        header h1 {
            margin: 0;
            color: #66fcf1;
            font-size: 28px;
        }

        /* Anime Listesi Alanı */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        /* Anime Kart Tasarımı */
        .anime-kart {
            background-color: #1f2833;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .anime-kart:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 252, 241, 0.3);
        }

        .anime-kart img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .anime-detay {
            padding: 15px;
            text-align: center;
        }

        .anime-detay h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* İzleme Butonu */
        .izle-btn {
            display: inline-block;
            width: 100%;
            padding: 10px 0;
            background-color: #45f3ff;
            color: #0b0c10;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .izle-btn:hover {
            background-color: #66fcf1;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #1f2833;
            margin-top: 50px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Anime Film & Dizi Arşivi</h1>
    </header>

    <div class="container">
        <div class="anime-grid">

            <div class="anime-kart">
                <img src="https://via.placeholder.com/200x280" alt="Anime Adı 1" loading="lazy">
                <div class="anime-detay">
                    <h3>Anime Başlığı 1</h3>
                    <a href="izle-linki-1.html" class="izle-btn">Şimdi İzle</a>
                </div>
            </div>

            <div class="anime-kart">
                <img src="https://via.placeholder.com/200x280" alt="Anime Adı 2" loading="lazy">
                <div class="anime-detay">
                    <h3>Anime Başlığı 2</h3>
                    <a href="izle-linki-2.html" class="izle-btn">Şimdi İzle</a>
                </div>
            </div>

            </div>
    </div>

    <footer>
        <p>&copy; 2026 Tüm Hakları Saklıdır.</p>
    </footer>

</body>
</html>
